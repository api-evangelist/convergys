name: Convergys
kind: company
description: >-
  Convergys was a global leader in customer management services, providing
  customer care, technology services, and analytics across industries before
  being acquired by Concentrix in October 2018. The legacy convergys.com
  domain now redirects to Concentrix, and Convergys offerings such as
  contact center outsourcing, workforce management, analytics, and digital
  customer experience platforms have been folded into the Concentrix
  portfolio. Concentrix itself does not publish public REST APIs or
  developer programs in the way SaaS vendors do. Most platform integrations
  are delivered through enterprise contracts and private APIs.
